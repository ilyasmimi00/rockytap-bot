<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RockyTap - لوحة التحكم</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0A0F1A 0%, #05080F 100%);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            padding: 0;
            padding-bottom: 80px;
        }
        .game-container { max-width: 450px; margin: 0 auto; }
        
        .header-custom {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            border-bottom: 1px solid rgba(0, 191, 255, 0.2);
            z-index: 1000;
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
            border-radius: 0 !important;
        }
        .header-spacer { height: 65px; }
        
        .logo-text {
            background: linear-gradient(135deg, #00BFFF, #00CED1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }
        .icon-btn { 
            font-size: 1.5rem; 
            cursor: pointer; 
            transition: all 0.2s; 
            color: #aaa; 
            margin-left: 15px;
            background: transparent;
            border: none;
        }
        .icon-btn:hover { color: #00BFFF; transform: scale(1.1); }
        
        .lang-btn {
            background: rgba(0, 191, 255, 0.15);
            border: 1px solid rgba(0, 191, 255, 0.3);
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            color: #00BFFF;
            transition: all 0.2s;
            border-radius: 20px;
        }
        
        .page-title {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(0, 191, 255, 0.1), rgba(0, 0, 0, 0.3));
            border-bottom: 1px solid rgba(0, 191, 255, 0.2);
        }
        .page-title h2 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #00BFFF, #00CED1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .admin-tabs {
            display: flex;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(0, 191, 255, 0.2);
        }
        .admin-tab {
            flex: 1;
            text-align: center;
            padding: 12px 5px;
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }
        .admin-tab i { display: block; font-size: 18px; margin-bottom: 5px; }
        .admin-tab.active {
            color: #00BFFF;
            border-bottom: 2px solid #00BFFF;
            background: rgba(0, 191, 255, 0.1);
        }
        .admin-tab:hover { color: #00BFFF; }
        
        .tab-content { display: none; padding: 20px 16px; }
        .tab-content.active { display: block; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-admin-card {
            background: linear-gradient(135deg, rgba(0, 30, 50, 0.6), rgba(0, 15, 30, 0.8));
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(0, 191, 255, 0.3);
        }
        .stat-admin-value { font-size: 24px; font-weight: 800; color: #00BFFF; }
        .stat-admin-label { font-size: 11px; color: #aaa; }
        
        .admin-form-group { margin-bottom: 15px; }
        .admin-form-group label {
            display: block;
            margin-bottom: 8px;
            color: #00BFFF;
            font-size: 13px;
            font-weight: 600;
        }
        .admin-form-group input, .admin-form-group select, .admin-form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 191, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 14px;
        }
        .admin-form-group input:focus, .admin-form-group select:focus, .admin-form-group textarea:focus {
            outline: none;
            border-color: #00BFFF;
        }
        
        .admin-btn {
            background: linear-gradient(135deg, #00BFFF, #0088aa);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }
        .admin-btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .admin-btn-success { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .admin-btn-warning { background: linear-gradient(135deg, #e67e22, #d35400); }
        .admin-btn:hover { transform: scale(1.02); opacity: 0.9; }
        
        .items-list { max-height: 300px; overflow-y: auto; }
        .list-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0, 191, 255, 0.15);
        }
        
        .two-columns { display: flex; gap: 10px; }
        .two-columns > div { flex: 1; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 10px 20px;
            border-top: 1px solid rgba(0, 191, 255, 0.2);
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
            z-index: 1000;
        }
        .nav-item { text-align: center; color: #666; transition: color 0.2s; cursor: pointer; font-size: 11px; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: #00BFFF; }
        .nav-item:hover { color: #00BFFF; }
        
        .message { padding: 10px; border-radius: 12px; margin-bottom: 15px; display: none; }
        .message.success { background: rgba(46, 204, 113, 0.2); border: 1px solid #2ecc71; color: #2ecc71; }
        .message.error { background: rgba(231, 76, 60, 0.2); border: 1px solid #e74c3c; color: #e74c3c; }
        
        .scroll-content {
            overflow-y: auto;
            height: calc(100vh - 130px);
            padding: 15px 0;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header-custom">
        <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <div class="logo-icon d-flex align-items-center justify-content-center" 
                     style="width: 38px; height: 38px; background: linear-gradient(135deg, #00BFFF, #0088aa); border-radius: 10px;">
                    <i class="fas fa-gamepad text-white"></i>
                </div>
                <span class="logo-text fw-bold fs-5">RockyTap</span>
            </div>
            <div class="d-flex gap-3 align-items-center">
                <button class="lang-btn" onclick="toggleLanguage()">
                    <i class="fas fa-globe"></i> EN
                </button>
                <i class="fas fa-wallet icon-btn" onclick="goTo('withdraw')"></i>
                <i class="fas fa-bell icon-btn" onclick="showAlert('🔔 لا توجد إشعارات جديدة')"></i>
            </div>
        </div>
    </div>
    
    <div class="header-spacer"></div>
    
    <div class="scroll-content">
        <div class="page-title">
            <h2>👑 لوحة التحكم</h2>
        </div>
        
        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="dashboard">📊</button>
            <button class="admin-tab" data-tab="users">👥</button>
            <button class="admin-tab" data-tab="tasks">📋</button>
            <button class="admin-tab" data-tab="ads">📺</button>
            <button class="admin-tab" data-tab="referral">🎁</button>
            <button class="admin-tab" data-tab="withdrawals">💰</button>
            <button class="admin-tab" data-tab="codes">🎫</button>
            <button class="admin-tab" data-tab="settings">⚙️</button>
        </div>
        
        <div id="messageBox" class="message"></div>
        
        <!-- Dashboard -->
        <div id="tab-dashboard" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-admin-card"><div class="stat-admin-value" id="statUsers">0</div><div class="stat-admin-label">المستخدمين</div></div>
                <div class="stat-admin-card"><div class="stat-admin-value" id="statActive">0</div><div class="stat-admin-label">نشطاء اليوم</div></div>
                <div class="stat-admin-card"><div class="stat-admin-value" id="statWithdraws">0</div><div class="stat-admin-label">طلبات السحب</div></div>
                <div class="stat-admin-card"><div class="stat-admin-value" id="statTotalCoins">0</div><div class="stat-admin-label">إجمالي التون</div></div>
            </div>
            <canvas id="usersChart" height="150"></canvas>
        </div>
        
        <!-- إدارة المستخدمين -->
        <div id="tab-users" class="tab-content">
            <div class="admin-form-group">
                <label>➕ إضافة رصيد لمستخدم</label>
                <div class="two-columns">
                    <input type="text" id="userId" placeholder="معرف المستخدم">
                    <input type="number" id="userAmount" placeholder="المبلغ">
                </div>
                <div class="two-columns" style="margin-top: 10px;">
                    <select id="userCurrency">
                        <option value="ton">تون</option>
                        <option value="points">نقاط</option>
                    </select>
                    <button class="admin-btn admin-btn-success" onclick="addUserBalance()">➕ إضافة</button>
                </div>
            </div>
            <div class="admin-form-group">
                <label>⛔ حظر مستخدم</label>
                <div class="two-columns">
                    <input type="text" id="banUserId" placeholder="معرف المستخدم">
                    <button class="admin-btn admin-btn-danger" onclick="banUser()">⛔ حظر</button>
                </div>
            </div>
            <div class="admin-form-group">
                <label>📋 قائمة المستخدمين</label>
                <div class="items-list" id="usersList"></div>
            </div>
        </div>
        
        <!-- إدارة المهام -->
        <div id="tab-tasks" class="tab-content">
            <div class="admin-form-group">
                <label>➕ إضافة مهمة جديدة</label>
                <div class="two-columns">
                    <input type="text" id="taskTitle" placeholder="عنوان المهمة">
                    <input type="text" id="taskIcon" placeholder="أيقونة (📺)" value="📺">
                </div>
                <textarea id="taskDescription" rows="2" placeholder="وصف المهمة"></textarea>
                
                <div class="two-columns" style="margin-top: 10px;">
                    <input type="text" id="channelLink" placeholder="رابط القناة (https://t.me/...)">
                    <input type="text" id="channelUsername" placeholder="معرف القناة (@channel)">
                </div>
                
                <div class="two-columns" style="margin-top: 10px;">
                    <input type="number" id="rewardPoints" placeholder="مكافأة النقاط" value="100">
                    <input type="number" id="rewardTon" placeholder="مكافأة التون" value="0" step="0.001">
                </div>
                
                <button class="admin-btn admin-btn-success mt-2" onclick="createTask()">➕ إنشاء مهمة</button>
            </div>
            
            <div class="admin-form-group">
                <label>📋 قائمة المهام</label>
                <div class="items-list" id="tasksList">
                    <div class="loading">جاري التحميل...</div>
                </div>
            </div>
        </div>
        
        <!-- إدارة الإعلانات العادية -->
        <div id="tab-ads" class="tab-content">
            <div class="admin-form-group">
                <label>🔑 API كود GramAds</label>
                <textarea id="gramadsApiKey" rows="3" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."></textarea>
                <button class="admin-btn admin-btn-success mt-2" onclick="saveApiKey()">💾 حفظ API</button>
            </div>
            
            <div class="admin-form-group">
                <label>⭐ النقاط لكل إعلان</label>
                <input type="number" id="pointsPerAd" value="15" min="1" max="1000">
                <button class="admin-btn admin-btn-success mt-2" onclick="savePointsPerAd()">💾 حفظ</button>
            </div>
            
            <div class="admin-form-group">
                <label>📺 الحد اليومي للإعلانات</label>
                <input type="number" id="dailyAdLimit" value="10" min="1" max="50">
                <button class="admin-btn admin-btn-success mt-2" onclick="saveDailyAdLimit()">💾 حفظ</button>
            </div>
            
            <div class="admin-form-group">
                <label>📊 الإعدادات الحالية</label>
                <div class="items-list" id="adsSettingsList">
                    <div class="list-item"><div>🔑 API:</div><div id="currentApiStatus">غير محدد</div></div>
                    <div class="list-item"><div>⭐ النقاط لكل إعلان:</div><div id="currentPointsPerAd">15</div></div>
                    <div class="list-item"><div>📺 الحد اليومي:</div><div id="currentDailyLimit">10</div></div>
                </div>
            </div>
        </div>
        
        <!-- إعدادات الإحالات -->
        <div id="tab-referral" class="tab-content">
            <div class="admin-form-group">
                <label>🎁 نوع المكافأة</label>
                <select id="referralRewardType">
                    <option value="points">⭐ نقاط فقط</option>
                    <option value="ton">💰 تون فقط</option>
                    <option value="both">⭐ نقاط + 💰 تون</option>
                </select>
            </div>
            <div class="admin-form-group">
                <label>⭐ قيمة النقاط</label>
                <input type="number" id="referralPoints" value="100">
            </div>
            <div class="admin-form-group">
                <label>💰 قيمة التون</label>
                <input type="number" id="referralTon" value="0.01" step="0.001">
            </div>
            <div class="admin-form-group">
                <label>📋 عدد المهام المطلوبة</label>
                <input type="number" id="referralRequiredTasks" value="6">
            </div>
            <button class="admin-btn admin-btn-success" onclick="saveReferralSettings()">💾 حفظ إعدادات الإحالات</button>
        </div>
        
        <!-- طلبات السحب -->
        <div id="tab-withdrawals" class="tab-content">
            <div class="admin-form-group">
                <label>💰 الحد الأدنى للسحب (تون)</label>
                <input type="number" id="minWithdraw" value="0.02" step="0.01">
                <button class="admin-btn admin-btn-success mt-2" onclick="saveMinWithdraw()">💾 حفظ</button>
            </div>
            <div class="admin-form-group">
                <label>📋 طلبات السحب</label>
                <div class="items-list" id="pendingWithdraws"></div>
            </div>
        </div>
        
        <!-- إدارة الأكواد -->
        <div id="tab-codes" class="tab-content">
            <div class="admin-form-group">
                <label>✨ إنشاء كود ترويجي</label>
                <input type="number" id="codeAmount" placeholder="المبلغ (تون)">
                <input type="number" id="codeUses" placeholder="عدد الاستخدامات">
                <button class="admin-btn admin-btn-success mt-2" onclick="createCode()">✨ إنشاء كود</button>
            </div>
            <div class="admin-form-group">
                <label>📋 قائمة الأكواد</label>
                <div class="items-list" id="codesList"></div>
            </div>
        </div>
        
        <!-- إعدادات النظام -->
        <div id="tab-settings" class="tab-content">
            <div class="admin-form-group">
                <label>💱 سعر الصرف (نقطة = كم تون)</label>
                <input type="number" id="exchangeRate" value="10">
                <button class="admin-btn admin-btn-success mt-2" onclick="saveExchangeRate()">💾 حفظ</button>
            </div>
            <div class="admin-form-group">
                <label>🎡 محاولات عجلة الحظ اليومية</label>
                <input type="number" id="dailyWheel" value="3">
            </div>
            <div class="admin-form-group">
                <label>🎁 جوائز عجلة الحظ (افصل بينها بفاصلة)</label>
                <input type="text" id="wheelRewards" value="5,10,15,20,25,50,75,100">
            </div>
            <button class="admin-btn admin-btn-success" onclick="saveSystemSettings()">💾 حفظ جميع الإعدادات</button>
        </div>
        
    </div>
</div>

<div class="bottom-nav">
    <div class="row text-center">
        <div class="col"><div class="nav-item" onclick="goTo('home')"><i class="fas fa-home"></i><div>الرئيسية</div></div></div>
        <div class="col"><div class="nav-item" onclick="goTo('tasks')"><i class="fas fa-tasks"></i><div>المهام</div></div></div>
        <div class="col"><div class="nav-item" onclick="goTo('wheel')"><i class="fas fa-gamepad"></i><div>عجلة</div></div></div>
        <div class="col"><div class="nav-item" onclick="goTo('ads')"><i class="fas fa-video"></i><div>إعلانات</div></div></div>
        <div class="col"><div class="nav-item active" onclick="goTo('admin')"><i class="fas fa-crown"></i><div>أدمن</div></div></div>
    </div>
</div>

<script>
    let tg = null;
    let currentUserId = null;
    let chart = null;
    
    let users = [
        { user_id: 8268443100, username: "admin", first_name: "Admin", balance_ton: 1250, balance_points: 5000, is_blocked: false },
        { user_id: 123456789, username: "user1", first_name: "User1", balance_ton: 100, balance_points: 500, is_blocked: false }
    ];
    
    let tasks = [
        { id: 1, title: "قناة RockyTap", description: "اشترك في القناة", icon: "📺", channel_link: "https://t.me/RockyTap", channel_username: "@RockyTap", reward_points: 100, reward_ton: 0, completed_count: 5 },
        { id: 2, title: "قناة الأخبار", description: "تابع الأخبار", icon: "📰", channel_link: "https://t.me/CryptoNews", channel_username: "@CryptoNews", reward_points: 150, reward_ton: 0.01, completed_count: 3 }
    ];
    
    function initTelegram() {
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUserId = tg.initDataUnsafe.user.id;
            }
        }
        if (!currentUserId) currentUserId = 8268443100;
        window.currentUserId = currentUserId;
    }
    
    function initChart() {
        let ctx = document.getElementById('usersChart')?.getContext('2d');
        if (ctx) {
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['أسبوع1', 'أسبوع2', 'أسبوع3', 'أسبوع4'],
                    datasets: [{
                        label: 'النشطاء',
                        data: [450, 520, 580, 567],
                        borderColor: '#00BFFF',
                        backgroundColor: 'rgba(0,191,255,0.1)',
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: { responsive: true, plugins: { legend: { labels: { color: '#aaa' } } } }
            });
        }
    }
    
    function renderUsers() {
        let container = document.getElementById('usersList');
        if (!container) return;
        container.innerHTML = '';
        users.forEach(u => {
            let div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div>
                    <div>👤 ${u.username || u.first_name} (${u.user_id})</div>
                    <div style="font-size:11px;color:#aaa;">💰 ${u.balance_ton} TON | ⭐ ${u.balance_points} PTS</div>
                    ${u.is_blocked ? '<div style="color:#e74c3c;">⛔ محظور</div>' : ''}
                </div>
                <div>
                    <button class="admin-btn-danger" style="padding:5px 10px;" onclick="toggleBan('${u.user_id}')">${u.is_blocked ? '✅ إلغاء' : '⛔ حظر'}</button>
                </div>
            `;
            container.appendChild(div);
        });
    }
    
    function addUserBalance() {
        let uid = document.getElementById('userId')?.value.trim();
        let amt = parseFloat(document.getElementById('userAmount')?.value);
        let cur = document.getElementById('userCurrency')?.value;
        if (!uid || !amt) { showMessage('املأ الحقول', 'error'); return; }
        let u = users.find(u => u.user_id == uid || u.username === uid);
        if (u) {
            if (cur === 'ton') u.balance_ton += amt;
            else u.balance_points += amt;
            renderUsers();
            showMessage(`✅ تمت إضافة ${amt} ${cur} للمستخدم ${uid}`, 'success');
            sendToBot('admin_add_balance', { user_id: uid, amount: amt, currency: cur });
        } else { showMessage('المستخدم غير موجود', 'error'); }
        document.getElementById('userId').value = '';
        document.getElementById('userAmount').value = '';
    }
    
    function banUser() {
        let uid = document.getElementById('banUserId')?.value.trim();
        let u = users.find(u => u.user_id == uid || u.username === uid);
        if (u) {
            u.is_blocked = true;
            renderUsers();
            showMessage(`✅ تم حظر المستخدم ${uid}`, 'success');
            sendToBot('admin_ban_user', { user_id: uid });
        } else { showMessage('المستخدم غير موجود', 'error'); }
        document.getElementById('banUserId').value = '';
    }
    
    function toggleBan(userId) {
        let u = users.find(u => u.user_id == userId);
        if (u) {
            u.is_blocked = !u.is_blocked;
            renderUsers();
            showMessage(u.is_blocked ? '✅ تم حظر المستخدم' : '✅ تم إلغاء حظر المستخدم', 'success');
            sendToBot('admin_toggle_ban', { user_id: userId });
        }
    }
    
    function loadTasks() {
        let container = document.getElementById('tasksList');
        if (!container) return;
        if (tasks.length > 0) {
            let html = '';
            for (let task of tasks) {
                let rewardText = '';
                if (task.reward_points > 0) rewardText += `⭐ ${task.reward_points}`;
                if (task.reward_ton > 0) {
                    if (rewardText) rewardText += ' + ';
                    rewardText += `💰 ${task.reward_ton}`;
                }
                html += `
                    <div class="list-item">
                        <div>
                            <div>${task.icon} <strong>${task.title}</strong></div>
                            <div style="font-size:11px;color:#aaa;">${task.channel_username || task.channel_link}</div>
                            <div style="font-size:11px;color:#FFD700;">${rewardText}</div>
                            <div style="font-size:10px;color:#666;">👥 ${task.completed_count || 0} مكتمل</div>
                        </div>
                        <div>
                            <button class="admin-btn-danger" style="padding:5px 10px;margin-bottom:5px;width:100%;" onclick="deleteTask(${task.id})">🗑️ حذف</button>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        } else {
            container.innerHTML = '<div class="empty-state">📋 لا توجد مهام حالياً</div>';
        }
    }
    
    function createTask() {
        let title = document.getElementById('taskTitle')?.value.trim();
        let description = document.getElementById('taskDescription')?.value.trim();
        let icon = document.getElementById('taskIcon')?.value.trim() || '📺';
        let channelLink = document.getElementById('channelLink')?.value.trim();
        let channelUsername = document.getElementById('channelUsername')?.value.trim();
        let rewardPoints = parseFloat(document.getElementById('rewardPoints')?.value) || 0;
        let rewardTon = parseFloat(document.getElementById('rewardTon')?.value) || 0;
        
        if (!title || !channelLink) {
            showMessage('⚠️ عنوان المهمة ورابط القناة مطلوبان', 'error');
            return;
        }
        
        let newTask = {
            id: tasks.length + 1,
            title: title,
            description: description,
            icon: icon,
            channel_link: channelLink,
            channel_username: channelUsername,
            reward_points: rewardPoints,
            reward_ton: rewardTon,
            completed_count: 0
        };
        tasks.push(newTask);
        showMessage(`✅ تم إنشاء المهمة "${title}" بنجاح!`, 'success');
        
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDescription').value = '';
        document.getElementById('channelLink').value = '';
        document.getElementById('channelUsername').value = '';
        document.getElementById('rewardPoints').value = '100';
        document.getElementById('rewardTon').value = '0';
        loadTasks();
    }
    
    function deleteTask(taskId) {
        if (!confirm('هل أنت متأكد من حذف هذه المهمة؟')) return;
        let index = tasks.findIndex(t => t.id === taskId);
        if (index !== -1) {
            tasks.splice(index, 1);
            showMessage('✅ تم حذف المهمة بنجاح', 'success');
            loadTasks();
        }
    }
    
    function saveApiKey() {
        let apiKey = document.getElementById('gramadsApiKey').value.trim();
        if (!apiKey) { showMessage('⚠️ الرجاء إدخال API كود', 'error'); return; }
        localStorage.setItem('gramads_api_key', apiKey);
        document.getElementById('currentApiStatus').innerHTML = '✅ تم الحفظ';
        showMessage('✅ تم حفظ API كود', 'success');
    }
    
    function savePointsPerAd() {
        let points = document.getElementById('pointsPerAd').value;
        localStorage.setItem('points_per_ad', points);
        document.getElementById('currentPointsPerAd').innerHTML = points;
        showMessage(`✅ تم حفظ النقاط: ${points} نقطة لكل إعلان`, 'success');
    }
    
    function saveDailyAdLimit() {
        let limit = document.getElementById('dailyAdLimit').value;
        localStorage.setItem('daily_ad_limit', limit);
        document.getElementById('currentDailyLimit').innerHTML = limit;
        showMessage(`✅ تم حفظ الحد اليومي: ${limit} إعلان`, 'success');
    }
    
    function loadAdsSettings() {
        let savedApi = localStorage.getItem('gramads_api_key');
        let savedPoints = localStorage.getItem('points_per_ad');
        let savedLimit = localStorage.getItem('daily_ad_limit');
        if (savedApi) {
            document.getElementById('gramadsApiKey').value = savedApi;
            document.getElementById('currentApiStatus').innerHTML = '✅ محفوظ';
        }
        if (savedPoints) {
            document.getElementById('pointsPerAd').value = savedPoints;
            document.getElementById('currentPointsPerAd').innerHTML = savedPoints;
        }
        if (savedLimit) {
            document.getElementById('dailyAdLimit').value = savedLimit;
            document.getElementById('currentDailyLimit').innerHTML = savedLimit;
        }
    }
    
    function saveReferralSettings() {
        let settings = {
            reward_type: document.getElementById('referralRewardType').value,
            points_value: document.getElementById('referralPoints').value,
            ton_value: document.getElementById('referralTon').value,
            required_tasks: document.getElementById('referralRequiredTasks').value
        };
        showMessage('✅ تم حفظ إعدادات الإحالات', 'success');
    }
    
    function saveMinWithdraw() {
        let min = document.getElementById('minWithdraw').value;
        showMessage(`✅ تم حفظ الحد الأدنى للسحب: ${min} TON`, 'success');
    }
    
    function createCode() {
        let amount = document.getElementById('codeAmount').value;
        let uses = document.getElementById('codeUses').value;
        if (!amount || !uses) { showMessage('⚠️ الرجاء إدخال المبلغ وعدد الاستخدامات', 'error'); return; }
        showMessage(`✅ تم إنشاء كود بقيمة ${amount} TON لـ ${uses} استخدام`, 'success');
        document.getElementById('codeAmount').value = '';
        document.getElementById('codeUses').value = '';
    }
    
    function saveExchangeRate() {
        let rate = document.getElementById('exchangeRate').value;
        showMessage(`✅ تم حفظ سعر الصرف: 1 تون = ${rate} نقاط`, 'success');
    }
    
    function saveSystemSettings() {
        let settings = {
            exchange_rate: document.getElementById('exchangeRate').value,
            min_withdraw: document.getElementById('minWithdraw').value,
            daily_wheel: document.getElementById('dailyWheel').value,
            wheel_rewards: document.getElementById('wheelRewards').value
        };
        showMessage('✅ تم حفظ جميع الإعدادات', 'success');
    }
    
    function showMessage(msg, type) {
        let box = document.getElementById('messageBox');
        box.textContent = msg;
        box.className = `message ${type}`;
        box.style.display = 'block';
        setTimeout(() => box.style.display = 'none', 3000);
    }
    
    function sendToBot(action, data) {
        if (tg && tg.sendData) tg.sendData(JSON.stringify({ action: action, ...data }));
    }
    
    function showAlert(msg) { if (tg && tg.showAlert) tg.showAlert(msg); else alert(msg); }
    
    function goTo(page) {
        let pages = { 'home': 'index.html', 'tasks': 'tasks.html', 'wheel': 'wheel.html', 'ads': 'ads.html', 'withdraw': 'withdraw.html', 'referral': 'referral.html', 'giftcode': 'giftcode.html', 'admin': 'admin.html', 'admin_ads': 'admin_ads.html' };
        if (pages[page]) window.location.href = pages[page];
    }
    
    function toggleLanguage() {
        let btn = document.querySelector('.lang-btn');
        if (btn.innerHTML.includes('EN')) btn.innerHTML = '<i class="fas fa-globe"></i> عربي';
        else btn.innerHTML = '<i class="fas fa-globe"></i> EN';
    }
    
    function setupTabs() {
        document.querySelectorAll('.admin-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                let tabId = tab.getAttribute('data-tab');
                document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(`tab-${tabId}`).classList.add('active');
            });
        });
    }
    
    function initPage() {
        initTelegram();
        setupTabs();
        initChart();
        renderUsers();
        loadAdsSettings();
        loadTasks();
    }
    
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initPage);
    else initPage();
    
    window.addUserBalance = addUserBalance;
    window.banUser = banUser;
    window.toggleBan = toggleBan;
    window.saveApiKey = saveApiKey;
    window.savePointsPerAd = savePointsPerAd;
    window.saveDailyAdLimit = saveDailyAdLimit;
    window.saveReferralSettings = saveReferralSettings;
    window.saveMinWithdraw = saveMinWithdraw;
    window.createCode = createCode;
    window.saveExchangeRate = saveExchangeRate;
    window.saveSystemSettings = saveSystemSettings;
    window.createTask = createTask;
    window.deleteTask = deleteTask;
    window.goTo = goTo;
    window.toggleLanguage = toggleLanguage;
    window.showAlert = showAlert;
</script>

</body>
</html>
