<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RockyTap - الرئيسية</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0A0F1A 0%, #05080F 100%);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            padding: 0;
            padding-bottom: 80px;
        }
        .game-container { max-width: 450px; margin: 0 auto; }
        
        .header-custom {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            border-bottom: 1px solid rgba(0, 191, 255, 0.2);
            z-index: 1000;
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
            border-radius: 0 !important;
        }
        .header-spacer { height: 65px; }
        
        .logo-text {
            background: linear-gradient(135deg, #00BFFF, #00CED1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }
        .icon-btn { 
            font-size: 1.5rem; 
            cursor: pointer; 
            transition: all 0.2s; 
            color: #aaa; 
            margin-left: 15px;
            background: transparent;
            border: none;
        }
        .icon-btn:hover { color: #00BFFF; transform: scale(1.1); }
        
        .lang-btn {
            background: rgba(0, 191, 255, 0.15);
            border: 1px solid rgba(0, 191, 255, 0.3);
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            color: #00BFFF;
            transition: all 0.2s;
            border-radius: 20px;
        }
        
        .avatar-custom {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1a2a3a, #0f1a24);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            border: 2px solid #00BFFF;
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.3);
        }
        .avatar-custom i { font-size: 45px; color: #00BFFF; }
        .username {
            background: rgba(0, 191, 255, 0.1);
            padding: 5px 18px;
            border-radius: 50px;
            font-size: 0.9rem;
            color: #aaa;
            display: inline-block;
        }
        .balance-card {
            background: linear-gradient(135deg, rgba(0, 30, 50, 0.6), rgba(0, 15, 30, 0.8));
            border-radius: 24px;
            border: 1px solid rgba(0, 191, 255, 0.3);
            padding: 20px;
        }
        .balance-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
        }
        .balance-value {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #00BFFF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .balance-currency { font-size: 12px; color: #00BFFF; font-weight: 600; }
        .convert-btn {
            background: linear-gradient(95deg, #0a1a2a, #0a0f1a);
            border: 1px solid rgba(0, 191, 255, 0.4);
            border-radius: 60px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }
        .convert-btn:hover { border-color: #00BFFF; box-shadow: 0 0 15px rgba(0, 191, 255, 0.3); transform: scale(1.02); }
        .ads-progress-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(0, 191, 255, 0.2);
            margin: 0 16px 16px 16px;
        }
        .progress-title { font-size: 14px; color: #00BFFF; margin-bottom: 10px; }
        .progress-bar-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            height: 12px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            background: linear-gradient(90deg, #00BFFF, #00CED1);
            width: 40%;
            height: 100%;
            border-radius: 50px;
            transition: width 0.5s ease;
        }
        .progress-stats { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-top: 8px; gap: 10px; }
        .stat-item { flex: 1; text-align: center; }
        .ref-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(0, 191, 255, 0.15);
            transition: all 0.3s;
            margin-bottom: 16px;
        }
        .ref-card:hover { border-color: rgba(0, 191, 255, 0.4); transform: translateY(-3px); }
        .ref-number { font-size: 28px; font-weight: 800; color: #00BFFF; }
        .action-btn {
            background: linear-gradient(135deg, #0f1a24, #0a0f1a);
            border: 1px solid rgba(0, 191, 255, 0.25);
            border-radius: 28px;
            padding: 16px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .action-btn:hover { transform: translateY(-3px); border-color: #00BFFF; box-shadow: 0 10px 20px rgba(0, 191, 255, 0.2); }
        .action-btn i { font-size: 32px; display: block; margin-bottom: 8px; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 10px 20px;
            border-top: 1px solid rgba(0, 191, 255, 0.2);
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
            z-index: 1000;
        }
        .nav-item { text-align: center; color: #666; transition: color 0.2s; cursor: pointer; font-size: 11px; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: #00BFFF; }
        .nav-item:hover { color: #00BFFF; }
        
        .scroll-content {
            overflow-y: auto;
            height: calc(100vh - 130px);
            padding: 15px 0;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header-custom">
        <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <div class="logo-icon d-flex align-items-center justify-content-center" 
                     style="width: 38px; height: 38px; background: linear-gradient(135deg, #00BFFF, #0088aa); border-radius: 10px;">
                    <i class="fas fa-gamepad text-white"></i>
                </div>
                <span class="logo-text fw-bold fs-5">RockyTap</span>
            </div>
            <div class="d-flex gap-3 align-items-center">
                <button class="lang-btn" onclick="toggleLanguage()">
                    <i class="fas fa-globe"></i> EN
                </button>
                <i class="fas fa-wallet icon-btn" onclick="goTo('withdraw')"></i>
                <i class="fas fa-bell icon-btn" onclick="showAlert('🔔 لا توجد إشعارات جديدة')"></i>
            </div>
        </div>
    </div>
    
    <div class="header-spacer"></div>
    
    <div class="scroll-content">
        <div id="home-page">
            <div class="text-center py-4">
                <div class="avatar-custom">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="username mt-2" id="usernameDisplay">
                    <i class="fas fa-at"></i> loading...
                </div>
            </div>
            
            <div class="px-3 mb-3">
                <div class="balance-card">
                    <div class="row g-3">
                        <div class="col-6">
                            <div class="balance-item">
                                <i class="fas fa-coins text-warning fs-2"></i>
                                <div class="balance-value mt-2" id="tonBalance">0</div>
                                <div class="balance-currency" id="tonLabel">TON</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="balance-item">
                                <i class="fas fa-star text-info fs-2"></i>
                                <div class="balance-value mt-2" id="pointsBalance">0</div>
                                <div class="balance-currency" id="pointsLabel">نقاط</div>
                            </div>
                        </div>
                    </div>
                    <div class="convert-btn" onclick="convertPoints()">
                        <div class="d-flex align-items-center justify-content-center gap-2">
                            <i class="fas fa-exchange-alt text-info"></i>
                            <span class="convert-text fw-bold" style="color: #00BFFF;" id="convertText">تحويل النقاط → تون</span>
                            <span class="convert-rate small text-secondary" id="convertRate">(1 تون = 10 نقاط)</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="ads-progress-card">
                <div class="progress-title" id="progressTitle">
                    <i class="fas fa-video"></i> تقدم مشاهدة الإعلانات
                </div>
                <div class="progress-bar-container">
                    <div class="progress-fill" id="adsProgressFill" style="width: 0%;"></div>
                </div>
                <div class="progress-stats">
                    <div class="stat-item">📺 <span id="watchedLabel">تم المشاهدة</span>: <strong id="adsWatched">0</strong></div>
                    <div class="stat-item">🎯 <span id="remainingLabel">المتبقي</span>: <strong id="adsRemaining">10</strong></div>
                    <div class="stat-item">🏆 <span id="targetLabel">الهدف</span>: <strong>10</strong></div>
                </div>
            </div>
            
            <div class="px-3">
                <div class="row g-3">
                    <div class="col-6">
                        <div class="ref-card">
                            <i class="fas fa-users text-info fs-1"></i>
                            <div class="ref-number" id="totalReferrals">0</div>
                            <div class="small text-secondary" id="totalReferralsLabel">إجمالي الإحالات</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="ref-card">
                            <i class="fas fa-user-check text-success fs-1"></i>
                            <div class="ref-number" id="activeReferrals">0</div>
                            <div class="small text-secondary" id="activeReferralsLabel">إحالات نشطة</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="px-3 mb-4 mt-2">
                <div class="row g-3">
                    <div class="col-6">
                        <div class="action-btn text-center" onclick="goTo('giftcode')">
                            <i class="fas fa-gift text-info"></i>
                            <div class="small text-white" id="giftcodeLabel">قيفت كود</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="action-btn text-center" onclick="goTo('referral')">
                            <i class="fas fa-share-alt text-info"></i>
                            <div class="small text-white" id="referralLabel">ريفيرال</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="action-btn text-center" onclick="goTo('tasks')">
                            <i class="fas fa-tasks text-info"></i>
                            <div class="small text-white" id="tasksLabel">المهام</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="action-btn text-center" onclick="goTo('wheel')">
                            <i class="fas fa-gamepad text-info"></i>
                            <div class="small text-white" id="wheelLabel">عجلة الحظ</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="action-btn text-center" onclick="goTo('ads_posting')">
                            <i class="fas fa-chart-line text-info"></i>
                            <div class="small text-white">إعلاناتي</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="action-btn text-center" onclick="goTo('admin')">
                            <i class="fas fa-crown text-info"></i>
                            <div class="small text-white" id="adminLabel">أدمن</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="row text-center">
        <div class="col"><div class="nav-item active" onclick="goTo('home')"><i class="fas fa-home"></i><div id="navHome">الرئيسية</div></div></div>
        <div class="col"><div class="nav-item" onclick="goTo('tasks')"><i class="fas fa-tasks"></i><div id="navTasks">المهام</div></div></div>
        <div class="col"><div class="nav-item" onclick="goTo('wheel')"><i class="fas fa-gamepad"></i><div id="navWheel">عجلة</div></div></div>
        <div class="col"><div class="nav-item" onclick="goTo('ads')"><i class="fas fa-video"></i><div id="navAds">إعلانات</div></div></div>
        <div class="col"><div class="nav-item" onclick="goTo('admin')"><i class="fas fa-crown"></i><div id="navAdmin">أدمن</div></div></div>
    </div>
</div>

<script>
    let tg = initWebApp();
    let user = getUser();
    let userId = user?.id;
    
    if (user) {
        document.getElementById('usernameDisplay').innerHTML = '<i class="fas fa-at"></i> ' + (user.username || user.first_name);
    }
    
    function convertPoints() {
        let points = parseInt(document.getElementById('pointsBalance').innerText);
        if (points < 10) {
            showAlert('⚠️ تحتاج 10 نقاط على الأقل للتحويل');
            return;
        }
        sendToBot('convert_points', { points: points });
    }
    
    function updateUI(data) {
        if (data.ton) document.getElementById('tonBalance').innerText = data.ton.toFixed(4);
        if (data.points) document.getElementById('pointsBalance').innerText = Math.floor(data.points);
        if (data.total_referrals) document.getElementById('totalReferrals').innerText = data.total_referrals;
        if (data.active_referrals) document.getElementById('activeReferrals').innerText = data.active_referrals;
        if (data.ads_watched !== undefined) {
            let progress = (data.ads_watched / 10) * 100;
            document.getElementById('adsProgressFill').style.width = progress + '%';
            document.getElementById('adsWatched').innerText = data.ads_watched;
            document.getElementById('adsRemaining').innerText = 10 - data.ads_watched;
        }
    }
    
    function sendToBot(action, data) {
        if (tg && tg.sendData) {
            tg.sendData(JSON.stringify({ action: action, ...data }));
        }
    }
    
    loadUserData(userId);
    
    window.convertPoints = convertPoints;
    window.updateUI = updateUI;
    window.sendToBot = sendToBot;
</script>

</body>
</html>
