<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RockyTap - المهام</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0A0F1A 0%, #05080F 100%);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            padding: 0;
            padding-bottom: 80px;
        }
        .game-container { max-width: 450px; margin: 0 auto; }
        
        .header-custom {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            border-bottom: 1px solid rgba(0, 191, 255, 0.2);
            z-index: 1000;
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
            border-radius: 0 !important;
        }
        .header-spacer { height: 65px; }
        
        .logo-text {
            background: linear-gradient(135deg, #00BFFF, #00CED1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }
        .icon-btn { 
            font-size: 1.5rem; 
            cursor: pointer; 
            transition: all 0.2s; 
            color: #aaa; 
            margin-left: 15px;
            background: transparent;
            border: none;
        }
        .icon-btn:hover { color: #00BFFF; transform: scale(1.1); }
        
        .lang-btn {
            background: rgba(0, 191, 255, 0.15);
            border: 1px solid rgba(0, 191, 255, 0.3);
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            color: #00BFFF;
            transition: all 0.2s;
            border-radius: 20px;
        }
        
        .ad-btn-small {
            background: linear-gradient(135deg, #00BFFF, #0088aa);
            border: none;
            padding: 6px 12px;
            border-radius: 50px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-right: 10px;
        }
        
        .page-title { 
            text-align: center; 
            padding: 20px; 
            color: #00BFFF; 
            font-size: 24px; 
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .tasks-list { display: flex; flex-direction: column; gap: 12px; padding: 0 16px; }
        
        .task-card {
            background: linear-gradient(135deg, rgba(0, 20, 35, 0.7), rgba(0, 10, 20, 0.8));
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(0, 191, 255, 0.25);
            transition: all 0.3s;
        }
        
        .task-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .task-icon {
            width: 48px;
            height: 48px;
            background: rgba(0, 191, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .task-info {
            flex: 1;
        }
        .task-title {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
        }
        .task-reward {
            font-size: 12px;
            color: #FFD700;
            margin-top: 4px;
        }
        
        .task-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .task-btn {
            flex: 1;
            padding: 10px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }
        .btn-go {
            background: linear-gradient(135deg, #00BFFF, #0088aa);
            color: white;
        }
        .btn-verify {
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
        }
        .btn-completed {
            background: #2ecc71;
            color: white;
            opacity: 0.7;
            cursor: not-allowed;
        }
        .btn-pending {
            background: #555;
            color: #aaa;
            cursor: not-allowed;
        }
        
        .task-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 10px;
            margin-top: 8px;
        }
        .status-completed { background: #2ecc7133; color: #2ecc71; }
        .status-pending { background: #f39c1233; color: #f39c12; }
        .status-available { background: #00BFFF33; color: #00BFFF; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 10px 20px;
            border-top: 1px solid rgba(0, 191, 255, 0.2);
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: space-around;
        }
        .nav-item {
            text-align: center;
            color: #666;
            cursor: pointer;
            font-size: 11px;
        }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: #00BFFF; }
        
        .scroll-content {
            overflow-y: auto;
            height: calc(100vh - 130px);
            padding: 15px 0;
        }
        .loading, .empty-state {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header-custom">
        <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <div class="logo-icon d-flex align-items-center justify-content-center" 
                     style="width: 38px; height: 38px; background: linear-gradient(135deg, #00BFFF, #0088aa); border-radius: 10px;">
                    <i class="fas fa-gamepad text-white"></i>
                </div>
                <span class="logo-text fw-bold fs-5">RockyTap</span>
            </div>
            <div class="d-flex gap-3 align-items-center">
                <button class="lang-btn" onclick="toggleLanguage()"><i class="fas fa-globe"></i> EN</button>
                <i class="fas fa-wallet icon-btn" onclick="goTo('withdraw')"></i>
                <i class="fas fa-bell icon-btn" onclick="showAlert('🔔 لا توجد إشعارات جديدة')"></i>
            </div>
        </div>
    </div>
    
    <div class="header-spacer"></div>
    
    <div class="scroll-content">
        <div class="page-title">
            📋 المهام
            <button class="ad-btn-small" onclick="goTo('ads_posting')">
                <i class="fas fa-plus"></i> إعلن
            </button>
        </div>
        
        <div class="tasks-list" id="tasksList">
            <div class="loading">📡 جاري التحميل...</div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="goTo('home')"><i class="fas fa-home"></i><div>الرئيسية</div></div>
    <div class="nav-item active" onclick="goTo('tasks')"><i class="fas fa-tasks"></i><div>المهام</div></div>
    <div class="nav-item" onclick="goTo('wheel')"><i class="fas fa-gamepad"></i><div>عجلة</div></div>
    <div class="nav-item" onclick="goTo('ads')"><i class="fas fa-video"></i><div>إعلانات</div></div>
    <div class="nav-item" onclick="goTo('admin')"><i class="fas fa-crown"></i><div>أدمن</div></div>
</div>

<script>
    let tg = null;
    let currentUserId = null;
    let tasks = [];
    let userTaskStatus = {}; // تخزين حالة كل مهمة للمستخدم
    
    // رابط API (سيتم تحديثه لاحقاً)
    let API_URL = 'https://furthermore-specials-hospital-dirt.trycloudflare.com/api';
    
    // بيانات المهام الاحتياطية
    const fallbackTasks = [
        { id: 1, title: "قناة RockyTap", icon: "📺", channel_link: "https://t.me/RockyTap", channel_username: "@RockyTap", reward: 100 },
        { id: 2, title: "قناة الأخبار", icon: "📰", channel_link: "https://t.me/CryptoNews", channel_username: "@CryptoNews", reward: 150 },
        { id: 3, title: "مجموعة المناقشات", icon: "👥", channel_link: "https://t.me/RockyTapGroup", channel_username: "@RockyTapGroup", reward: 200 }
    ];
    
    // تهيئة
    function initTelegram() {
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUserId = tg.initDataUnsafe.user.id;
                window.currentUserId = currentUserId;
            }
        }
        if (!currentUserId) {
            currentUserId = localStorage.getItem('userId') || 8268443100;
            window.currentUserId = currentUserId;
        }
        console.log('Tasks page - User ID:', currentUserId);
    }
    
    // تحميل المهام
    async function loadTasks() {
        const container = document.getElementById('tasksList');
        if (container) {
            container.innerHTML = '<div class="loading">📡 جاري التحميل...</div>';
        }
        
        try {
            const response = await fetch(`${API_URL}/tasks?user_id=${currentUserId}`);
            const result = await response.json();
            
            if (result && result.success && result.tasks) {
                tasks = result.tasks;
            } else {
                tasks = fallbackTasks;
            }
        } catch(e) {
            console.error('Error loading tasks:', e);
            tasks = fallbackTasks;
        }
        
        // تحميل حالة المهام من localStorage
        loadUserTaskStatus();
    }
    
    function loadUserTaskStatus() {
        const saved = localStorage.getItem(`task_status_${currentUserId}`);
        if (saved) {
            userTaskStatus = JSON.parse(saved);
        } else {
            userTaskStatus = {};
        }
        renderTasks();
    }
    
    function saveUserTaskStatus() {
        localStorage.setItem(`task_status_${currentUserId}`, JSON.stringify(userTaskStatus));
    }
    
    function renderTasks() {
        const container = document.getElementById('tasksList');
        if (!tasks || tasks.length === 0) {
            container.innerHTML = '<div class="empty-state">✨ لا توجد مهام متاحة حالياً</div>';
            return;
        }
        
        let html = '';
        for (let task of tasks) {
            const status = userTaskStatus[task.id] || 'available';
            let statusText = '';
            let statusClass = '';
            let buttonHtml = '';
            
            if (status === 'completed') {
                statusText = '✓ مكتمل';
                statusClass = 'status-completed';
                buttonHtml = `<button class="task-btn btn-completed" disabled>✅ تم الإكمال</button>`;
            } else if (status === 'pending') {
                statusText = '⏳ قيد الانتظار';
                statusClass = 'status-pending';
                buttonHtml = `
                    <button class="task-btn btn-verify" onclick="verifyTask(${task.id})">✅ تحقق</button>
                `;
            } else {
                statusText = '📌 متاحة';
                statusClass = 'status-available';
                buttonHtml = `
                    <button class="task-btn btn-go" onclick="goToChannel(${task.id})">🔗 اذهب</button>
                `;
            }
            
            const rewardText = `⭐ ${task.reward} نقطة`;
            
            html += `
                <div class="task-card">
                    <div class="task-header">
                        <div class="task-icon">${task.icon || '📺'}</div>
                        <div class="task-info">
                            <div class="task-title">${task.title}</div>
                            <div class="task-reward">${rewardText}</div>
                        </div>
                    </div>
                    <div class="task-buttons">
                        ${buttonHtml}
                    </div>
                    <div class="task-status ${statusClass}">${statusText}</div>
                </div>
            `;
        }
        container.innerHTML = html;
    }
    
    // الذهاب إلى القناة
    function goToChannel(taskId) {
        const task = tasks.find(t => t.id === taskId);
        if (!task) return;
        
        // تغيير الحالة إلى "قيد الانتظار"
        userTaskStatus[taskId] = 'pending';
        saveUserTaskStatus();
        renderTasks();
        
        // فتح رابط القناة
        const channelLink = task.channel_link || `https://t.me/${task.channel_username?.replace('@', '')}`;
        window.open(channelLink, '_blank');
        
        showAlert('🔗 تم فتح القناة. بعد الاشتراك، اضغط على زر "تحقق"');
    }
    
    // التحقق من الاشتراك
    async function verifyTask(taskId) {
        const task = tasks.find(t => t.id === taskId);
        if (!task) return;
        
        if (userTaskStatus[taskId] === 'completed') {
            showAlert('✅ لقد حصلت على المكافأة بالفعل!');
            return;
        }
        
        showAlert('🔍 جاري التحقق من اشتراكك...');
        
        try {
            // محاولة التحقق عبر API
            const response = await fetch(`${API_URL}/verify_subscription`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: currentUserId,
                    task_id: taskId,
                    channel_username: task.channel_username
                })
            });
            const result = await response.json();
            
            if (result && result.success) {
                // منح المكافأة
                await claimReward(taskId, task.reward);
            } else {
                // محاكاة التحقق (للتجربة)
                simulateVerification(taskId, task);
            }
        } catch(e) {
            console.error('Error verifying:', e);
            simulateVerification(taskId, task);
        }
    }
    
    function simulateVerification(taskId, task) {
        showAlert('⚠️ تجريبي: تم التحقق بنجاح (محاكاة)');
        
        setTimeout(() => {
            claimReward(taskId, task.reward);
        }, 1000);
    }
    
    async function claimReward(taskId, reward) {
        try {
            const response = await fetch(`${API_URL}/complete_task`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: currentUserId,
                    task_id: taskId,
                    reward: reward
                })
            });
            const result = await response.json();
            
            if (result && result.success) {
                // تحديث الرصيد المحلي
                let currentPoints = parseInt(localStorage.getItem(`points_${currentUserId}`) || '0');
                currentPoints += reward;
                localStorage.setItem(`points_${currentUserId}`, currentPoints);
                
                // تحديث حالة المهمة
                userTaskStatus[taskId] = 'completed';
                saveUserTaskStatus();
                renderTasks();
                
                showAlert(`🎉 مبروك! حصلت على ${reward} نقطة!`);
            } else {
                // تحديث محلي حتى لو فشل API
                let currentPoints = parseInt(localStorage.getItem(`points_${currentUserId}`) || '0');
                currentPoints += reward;
                localStorage.setItem(`points_${currentUserId}`, currentPoints);
                
                userTaskStatus[taskId] = 'completed';
                saveUserTaskStatus();
                renderTasks();
                
                showAlert(`🎉 مبروك! حصلت على ${reward} نقطة!`);
            }
        } catch(e) {
            // تحديث محلي
            let currentPoints = parseInt(localStorage.getItem(`points_${currentUserId}`) || '0');
            currentPoints += reward;
            localStorage.setItem(`points_${currentUserId}`, currentPoints);
            
            userTaskStatus[taskId] = 'completed';
            saveUserTaskStatus();
            renderTasks();
            
            showAlert(`🎉 مبروك! حصلت على ${reward} نقطة!`);
        }
    }
    
    function showAlert(msg) {
        if (tg && tg.showAlert) {
            tg.showAlert(msg);
        } else {
            alert(msg);
        }
    }
    
    function goTo(page) {
        const pages = { 
            'home': '/index.html', 
            'tasks': '/tasks.html', 
            'wheel': '/wheel.html', 
            'ads': '/ads.html', 
            'ads_posting': '/ads_posting.html',
            'withdraw': '/withdraw.html', 
            'referral': '/referral.html', 
            'giftcode': '/giftcode.html', 
            'admin': '/admin.html' 
        };
        if (pages[page]) {
            window.location.href = pages[page];
        }
    }
    
    function toggleLanguage() {
        let btn = document.querySelector('.lang-btn');
        if (btn.innerHTML.includes('EN')) {
            btn.innerHTML = '<i class="fas fa-globe"></i> عربي';
            document.body.dir = 'rtl';
        } else {
            btn.innerHTML = '<i class="fas fa-globe"></i> EN';
            document.body.dir = 'ltr';
        }
    }
    
    // التهيئة
    initTelegram();
    loadTasks();
    
    window.goToChannel = goToChannel;
    window.verifyTask = verifyTask;
    window.toggleLanguage = toggleLanguage;
    window.goTo = goTo;
    window.showAlert = showAlert;
</script>
</body>
</html>
