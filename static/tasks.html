<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RockyTap - المهام</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0A0F1A 0%, #05080F 100%);
            font-family: 'Cairo', sans-serif;
            padding: 15px;
            padding-bottom: 80px;
            color: white;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #0A0F1A;
            padding: 12px 20px;
            border-bottom: 1px solid #00BFFF;
            z-index: 1000;
            text-align: center;
        }
        .header h3 { color: #00BFFF; margin: 0; }
        .header-spacer { height: 60px; }
        .task-card {
            background: rgba(0, 191, 255, 0.1);
            border: 1px solid #00BFFF;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .task-card:hover { background: rgba(0, 191, 255, 0.2); }
        .task-title { font-size: 18px; font-weight: bold; }
        .task-reward { color: #FFD700; font-size: 13px; margin: 5px 0; }
        .task-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
        }
        .status-available { background: #00BFFF33; color: #00BFFF; }
        .status-completed { background: #2ecc7133; color: #2ecc71; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0A0F1A;
            border-top: 1px solid #00BFFF;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            max-width: 450px;
            margin: 0 auto;
        }
        .nav-item {
            text-align: center;
            color: #666;
            cursor: pointer;
            font-size: 12px;
        }
        .nav-item.active { color: #00BFFF; }
        .nav-item i { font-size: 22px; display: block; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: #0A0F1A;
            border: 2px solid #00BFFF;
            border-radius: 20px;
            padding: 20px;
            max-width: 350px;
            width: 100%;
        }
        .btn {
            background: #00BFFF;
            border: none;
            padding: 10px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn-warning { background: #e67e22; }
        .btn-success { background: #2ecc71; }
        .close-btn {
            float: left;
            background: none;
            border: none;
            color: #aaa;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <h3>📋 المهام</h3>
</div>
<div class="header-spacer"></div>

<div class="container" id="tasksContainer">
    <div style="text-align:center;padding:50px;color:#aaa;">جاري التحميل...</div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="goTo('home')"><i class="fas fa-home"></i><div>الرئيسية</div></div>
    <div class="nav-item active" onclick="goTo('tasks')"><i class="fas fa-tasks"></i><div>المهام</div></div>
    <div class="nav-item" onclick="goTo('wheel')"><i class="fas fa-gamepad"></i><div>عجلة</div></div>
    <div class="nav-item" onclick="goTo('ads')"><i class="fas fa-video"></i><div>إعلانات</div></div>
    <div class="nav-item" onclick="goTo('admin')"><i class="fas fa-crown"></i><div>أدمن</div></div>
</div>

<div id="taskModal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <h3 id="modalTitle" style="color:#00BFFF;">المهمة</h3>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    let tg = null;
    let userId = null;
    
    // المفتاح الموحد للمهام (نفس المفتاح المستخدم في admin.html)
    const TASKS_STORAGE_KEY = 'all_tasks';
    const COMPLETED_TASKS_KEY = 'completed_tasks';
    
    // تهيئة تليجرام
    if (window.Telegram && window.Telegram.WebApp) {
        tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userId = tg.initDataUnsafe.user.id;
        }
    }
    if (!userId) userId = 8268443100;
    
    // تحميل المهام من localStorage (نفس المصدر)
    function loadTasks() {
        return JSON.parse(localStorage.getItem(TASKS_STORAGE_KEY) || '[]');
    }
    
    // تحميل المهام المكتملة للمستخدم
    function loadCompletedTasks() {
        return JSON.parse(localStorage.getItem(`${COMPLETED_TASKS_KEY}_${userId}`) || '[]');
    }
    
    // حفظ المهام المكتملة
    function saveCompletedTasks(completed) {
        localStorage.setItem(`${COMPLETED_TASKS_KEY}_${userId}`, JSON.stringify(completed));
    }
    
    // عرض المهام
    function renderTasks() {
        const container = document.getElementById('tasksContainer');
        if (!container) return;
        
        const tasks = loadTasks();
        const completedTasks = loadCompletedTasks();
        
        if (tasks.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:50px;color:#666;">لا توجد مهام حالياً</div>';
            return;
        }
        
        let html = '';
        for (let task of tasks) {
            const isCompleted = completedTasks.includes(task.id);
            let statusClass = isCompleted ? 'status-completed' : 'status-available';
            let statusText = isCompleted ? '✓ مكتمل' : '📌 متاحة';
            
            html += `
                <div class="task-card" onclick="openTask(${task.id})">
                    <div class="task-title">${task.icon || '📺'} ${task.title}</div>
                    <div class="task-reward">⭐ ${task.reward_points} نقطة</div>
                    <div><span class="task-status ${statusClass}">${statusText}</span></div>
                </div>
            `;
        }
        container.innerHTML = html;
    }
    
    // فتح نافذة المهمة
    function openTask(taskId) {
        const tasks = loadTasks();
        const task = tasks.find(t => t.id === taskId);
        if (!task) return;
        
        const completedTasks = loadCompletedTasks();
        const isCompleted = completedTasks.includes(task.id);
        
        const modal = document.getElementById('taskModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        
        modalTitle.innerText = task.title;
        
        if (isCompleted) {
            modalBody.innerHTML = `
                <div style="text-align:center;padding:20px;">
                    <div style="font-size:48px;">✅</div>
                    <p style="color:#2ecc71;">لقد حصلت على المكافأة بالفعل!</p>
                    <button class="btn btn-success" onclick="closeModal()">إغلاق</button>
                </div>
            `;
        } else {
            modalBody.innerHTML = `
                <div style="text-align:center;margin-bottom:20px;">
                    <div style="font-size:48px;">${task.icon || '📺'}</div>
                    <p style="color:#aaa;margin:10px 0;">${task.description || 'اشترك في القناة واحصل على المكافأة'}</p>
                    <p style="color:#FFD700;">⭐ ${task.reward_points} نقطة</p>
                </div>
                <button class="btn" onclick="window.open('${task.channel_link}', '_blank')">🔗 اشتراك</button>
                <button class="btn btn-warning" onclick="verifyTask(${task.id})">✅ تحقق</button>
            `;
        }
        
        modal.style.display = 'flex';
    }
    
    // التحقق من المهمة
    function verifyTask(taskId) {
        const tasks = loadTasks();
        const task = tasks.find(t => t.id === taskId);
        if (!task) return;
        
        let completedTasks = loadCompletedTasks();
        if (completedTasks.includes(task.id)) {
            showAlert('⚠️ هذه المهمة مكتملة بالفعل!');
            return;
        }
        
        showAlert('🔍 جاري التحقق...');
        
        setTimeout(() => {
            // تسجيل المهمة كمكتملة
            completedTasks.push(task.id);
            saveCompletedTasks(completedTasks);
            
            // إضافة النقاط
            let currentPoints = parseInt(localStorage.getItem(`points_${userId}`) || '0');
            currentPoints += task.reward_points;
            localStorage.setItem(`points_${userId}`, currentPoints);
            
            renderTasks();
            closeModal();
            showAlert(`🎉 مبروك! حصلت على ${task.reward_points} نقطة!`);
        }, 1000);
    }
    
    function closeModal() {
        document.getElementById('taskModal').style.display = 'none';
    }
    
    function showAlert(msg) {
        if (tg && tg.showAlert) {
            tg.showAlert(msg);
        } else {
            alert(msg);
        }
    }
    
    function goTo(page) {
        const pages = { 
            'home': 'index.html', 
            'tasks': 'tasks.html', 
            'wheel': 'wheel.html', 
            'ads': 'ads.html', 
            'withdraw': 'withdraw.html', 
            'referral': 'referral.html', 
            'giftcode': 'giftcode.html', 
            'admin': 'admin.html' 
        };
        if (pages[page]) window.location.href = pages[page];
    }
    
    // تهيئة الصفحة
    renderTasks();
    
    window.openTask = openTask;
    window.closeModal = closeModal;
    window.verifyTask = verifyTask;
    window.goTo = goTo;
    window.showAlert = showAlert;
</script>
</body>
</html>
