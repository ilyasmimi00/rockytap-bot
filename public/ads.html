<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RockyTap - الإعلانات</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0A0F1A 0%, #05080F 100%);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            padding: 0;
            padding-bottom: 80px;
        }
        .game-container { max-width: 450px; margin: 0 auto; }
        
        .header-custom {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            border-bottom: 1px solid rgba(0, 191, 255, 0.2);
            z-index: 1000;
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
            border-radius: 0 !important;
        }
        .header-spacer { height: 65px; }
        
        .logo-text {
            background: linear-gradient(135deg, #00BFFF, #00CED1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }
        .icon-btn { 
            font-size: 1.5rem; 
            cursor: pointer; 
            transition: all 0.2s; 
            color: #aaa; 
            margin-left: 15px;
            background: transparent;
            border: none;
        }
        .icon-btn:hover { color: #00BFFF; transform: scale(1.1); }
        
        .lang-btn {
            background: rgba(0, 191, 255, 0.15);
            border: 1px solid rgba(0, 191, 255, 0.3);
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            color: #00BFFF;
            transition: all 0.2s;
            border-radius: 20px;
        }
        
        .page-title { text-align: center; padding: 20px; color: #00BFFF; font-size: 24px; font-weight: 800; }
        
        .stats-card {
            background: linear-gradient(135deg, rgba(0, 30, 50, 0.6), rgba(0, 15, 30, 0.8));
            border-radius: 20px;
            padding: 15px;
            margin: 0 16px 20px;
            text-align: center;
        }
        .stats-value { font-size: 28px; font-weight: 800; color: #FFD700; }
        
        .ads-list { padding: 0 16px; }
        .ad-card {
            background: linear-gradient(135deg, rgba(0, 20, 35, 0.7), rgba(0, 10, 20, 0.8));
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0, 191, 255, 0.25);
        }
        .ad-info { display: flex; align-items: center; gap: 15px; }
        .ad-icon { font-size: 32px; }
        .ad-name { font-weight: bold; }
        .ad-reward { font-size: 12px; color: #FFD700; }
        .watch-btn {
            background: linear-gradient(135deg, #00BFFF, #0088aa);
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
        }
        .watch-btn:disabled { background: #555; cursor: not-allowed; }
        
        .reset-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 12px;
            margin: 20px 16px;
            text-align: center;
            border: 1px solid rgba(0, 191, 255, 0.2);
        }
        .reset-timer { font-size: 20px; font-weight: bold; color: #00BFFF; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 10px 20px;
            border-top: 1px solid rgba(0, 191, 255, 0.2);
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            justify-content: space-around;
        }
        .nav-item {
            text-align: center;
            color: #666;
            cursor: pointer;
            font-size: 11px;
        }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: #00BFFF; }
        
        .scroll-content {
            overflow-y: auto;
            height: calc(100vh - 130px);
            padding: 15px 0;
        }
        
        .loading { text-align: center; padding: 40px; color: #aaa; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header-custom">
        <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <div class="logo-icon d-flex align-items-center justify-content-center" 
                     style="width: 38px; height: 38px; background: linear-gradient(135deg, #00BFFF, #0088aa); border-radius: 10px;">
                    <i class="fas fa-gamepad text-white"></i>
                </div>
                <span class="logo-text fw-bold fs-5">RockyTap</span>
            </div>
            <div class="d-flex gap-3 align-items-center">
                <button class="lang-btn" onclick="toggleLanguage()"><i class="fas fa-globe"></i> EN</button>
                <i class="fas fa-wallet icon-btn" onclick="goTo('withdraw')"></i>
                <i class="fas fa-bell icon-btn" onclick="showAlert('🔔 لا توجد إشعارات جديدة')"></i>
            </div>
        </div>
    </div>
    
    <div class="header-spacer"></div>
    
    <div class="scroll-content">
        <div class="page-title">📺 الإعلانات</div>
        
        <div class="stats-card">
            <div>مشاهدات اليوم</div>
            <div class="stats-value" id="watchedCount">0</div>
            <div>من أصل <span id="dailyLimit">10</span></div>
        </div>
        
        <div class="ads-list" id="adsList">
            <div class="loading">📡 جاري التحميل...</div>
        </div>
        
        <div class="reset-card">
            <div>🔄 يتم إعادة تعيين الإعلانات يومياً</div>
            <div class="reset-timer" id="resetTimer">--:--:--</div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="goTo('home')"><i class="fas fa-home"></i><div>الرئيسية</div></div>
    <div class="nav-item" onclick="goTo('tasks')"><i class="fas fa-tasks"></i><div>المهام</div></div>
    <div class="nav-item" onclick="goTo('wheel')"><i class="fas fa-gamepad"></i><div>عجلة</div></div>
    <div class="nav-item active" onclick="goTo('ads')"><i class="fas fa-video"></i><div>إعلانات</div></div>
    <div class="nav-item" onclick="goTo('admin')"><i class="fas fa-crown"></i><div>أدمن</div></div>
</div>

<script>
    let tg = null;
    let currentUserId = null;
    let ads = [];
    let watchedToday = 0;
    let dailyLimit = 10;
    
    function init() {
        tg = initWebApp();
        let user = getUser();
        if (user) {
            currentUserId = user.id;
        }
        
        loadAds();
        updateResetTimer();
        setInterval(updateResetTimer, 1000);
        resetDailyIfNeeded();
    }
    
    async function loadAds() {
        const container = document.getElementById('adsList');
        container.innerHTML = '<div class="loading">📡 جاري التحميل...</div>';
        
        try {
            const result = await getAds(currentUserId);
            
            if (result && result.success) {
                ads = result.ads || [];
                watchedToday = result.watched_today || 0;
                dailyLimit = result.daily_limit || 10;
                
                document.getElementById('watchedCount').innerText = watchedToday;
                document.getElementById('dailyLimit').innerText = dailyLimit;
                
                renderAds();
            } else {
                // إعلانات تجريبية
                ads = [
                    { id: 1, name: "AdsGram", reward: 15, icon: "📺" },
                    { id: 2, name: "MontageWeb", reward: 15, icon: "🎬" },
                    { id: 3, name: "GigaBI Display", reward: 15, icon: "🖥️" },
                    { id: 4, name: "شركة 4", reward: 15, icon: "📱" }
                ];
                renderAds();
            }
        } catch(e) {
            console.error('Error loading ads:', e);
            ads = [
                { id: 1, name: "AdsGram", reward: 15, icon: "📺" },
                { id: 2, name: "MontageWeb", reward: 15, icon: "🎬" }
            ];
            renderAds();
        }
    }
    
    function renderAds() {
        const container = document.getElementById('adsList');
        const remaining = dailyLimit - watchedToday;
        
        if (remaining <= 0) {
            container.innerHTML = '<div class="loading">🎉 لقد أكملت جميع إعلانات اليوم! عود غداً.</div>';
            return;
        }
        
        let html = '';
        for (let ad of ads) {
            html += `
                <div class="ad-card">
                    <div class="ad-info">
                        <div class="ad-icon">${ad.icon || '📺'}</div>
                        <div>
                            <div class="ad-name">${ad.name}</div>
                            <div class="ad-reward">💰 +${ad.reward} نقطة</div>
                        </div>
                    </div>
                    <button class="watch-btn" onclick="watchAd(${ad.id}, ${ad.reward})">📺 مشاهدة</button>
                </div>
            `;
        }
        container.innerHTML = html;
    }
    
    async function watchAd(adId, reward) {
        const remaining = dailyLimit - watchedToday;
        
        if (remaining <= 0) {
            showAlert('⚠️ لقد وصلت للحد اليومي للإعلانات! عود غداً.');
            return;
        }
        
        showAlert('📺 جاري تشغيل الإعلان...');
        
        try {
            const result = await watchAd(currentUserId, reward);
            
            if (result && result.success) {
                watchedToday++;
                document.getElementById('watchedCount').innerText = watchedToday;
                
                // تحديث النقاط في localStorage
                let currentPoints = parseInt(localStorage.getItem(`points_${currentUserId}`) || '0');
                currentPoints += reward;
                localStorage.setItem(`points_${currentUserId}`, currentPoints);
                
                showAlert(`✅ +${reward} نقطة! رصيدك الآن: ${currentPoints} نقطة\n📺 متبقي ${result.remaining} إعلان اليوم`);
                
                if (watchedToday >= dailyLimit) {
                    renderAds();
                }
            } else {
                showAlert('❌ ' + (result?.message || 'حدث خطأ'));
            }
        } catch(e) {
            console.error('Error watching ad:', e);
            // محاكاة للاختبار
            watchedToday++;
            document.getElementById('watchedCount').innerText = watchedToday;
            showAlert(`✅ +${reward} نقطة! (تجريبي)`);
        }
        
        renderAds();
    }
    
    function updateResetTimer() {
        const now = new Date();
        const utcNow = new Date(now.toUTCString());
        const nextReset = new Date(Date.UTC(utcNow.getUTCFullYear(), utcNow.getUTCMonth(), utcNow.getUTCDate() + 1, 0, 0, 0));
        const diff = nextReset - utcNow;
        
        if (diff <= 0) {
            resetDailyAds();
            return;
        }
        
        const hours = Math.floor(diff / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (3600000)) / (1000 * 60));
        const seconds = Math.floor((diff % (60000)) / 1000);
        document.getElementById('resetTimer').innerHTML = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }
    
    function resetDailyIfNeeded() {
        const lastReset = localStorage.getItem('adsLastResetDate');
        const today = new Date().toDateString();
        
        if (lastReset !== today) {
            watchedToday = 0;
            localStorage.setItem('adsLastResetDate', today);
            document.getElementById('watchedCount').innerText = watchedToday;
            renderAds();
        }
    }
    
    function resetDailyAds() {
        watchedToday = 0;
        localStorage.setItem('adsLastResetDate', new Date().toDateString());
        document.getElementById('watchedCount').innerText = watchedToday;
        renderAds();
        showAlert('🔄 تم إعادة تعيين الإعلانات! يمكنك مشاهدة إعلانات جديدة.');
    }
    
    function toggleLanguage() {
        let btn = document.querySelector('.lang-btn');
        if (btn.innerHTML.includes('EN')) {
            btn.innerHTML = '<i class="fas fa-globe"></i> عربي';
        } else {
            btn.innerHTML = '<i class="fas fa-globe"></i> EN';
        }
    }
    
    function goTo(page) {
        const pages = {
            'home': 'index.html',
            'tasks': 'tasks.html',
            'wheel': 'wheel.html',
            'ads': 'ads.html',
            'withdraw': 'withdraw.html',
            'referral': 'referral.html',
            'giftcode': 'giftcode.html',
            'admin': 'admin.html'
        };
        if (pages[page]) {
            window.location.href = pages[page];
        }
    }
    
    init();
    
    window.watchAd = watchAd;
    window.toggleLanguage = toggleLanguage;
    window.goTo = goTo;
</script>

</body>
</html>
