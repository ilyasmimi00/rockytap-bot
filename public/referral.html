<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RockyTap - الإحالات</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0A0F1A 0%, #05080F 100%);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            padding: 0;
            padding-bottom: 70px;
        }
        .game-container { max-width: 450px; margin: 0 auto; }
        
        /* رأس ثابت */
        .header-custom {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            border-bottom: 1px solid rgba(0, 191, 255, 0.2);
            z-index: 1000;
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
            border-radius: 0 !important;
        }
        .header-spacer { height: 65px; }
        
        .logo-text {
            background: linear-gradient(135deg, #00BFFF, #00CED1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }
        .icon-btn { 
            font-size: 1.5rem; 
            cursor: pointer; 
            transition: all 0.2s; 
            color: #aaa; 
            margin-left: 15px;
            background: transparent;
            border: none;
        }
        .icon-btn:hover { color: #00BFFF; }
        
        .page-title { text-align: center; padding: 20px; color: #00BFFF; font-size: 24px; font-weight: 800; }
        
        .stats-row { display: flex; gap: 15px; margin: 20px 16px; }
        .stat-card {
            flex: 1;
            background: linear-gradient(135deg, rgba(0, 30, 50, 0.6), rgba(0, 15, 30, 0.8));
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }
        .stat-value { font-size: 28px; font-weight: 800; color: #00BFFF; }
        .stat-label { font-size: 12px; color: #aaa; }
        
        .referral-link-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 15px;
            margin: 0 16px 20px;
            border: 1px solid rgba(0, 191, 255, 0.2);
        }
        .link-container {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 60px;
            padding: 5px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .link-container input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 15px;
            color: #00BFFF;
            font-size: 12px;
            direction: ltr;
            text-align: left;
            min-width: 150px;
        }
        .copy-btn, .share-btn {
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }
        .copy-btn { background: linear-gradient(135deg, #00BFFF, #0088aa); }
        .share-btn { background: linear-gradient(135deg, #25D366, #128C7E); }
        
        .referrals-list { margin: 20px 16px; }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #00BFFF;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(0, 191, 255, 0.2);
            padding-bottom: 8px;
        }
        .referral-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ref-name { font-weight: bold; }
        .ref-date { font-size: 10px; color: #aaa; margin-top: 5px; }
        .ref-status { 
            padding: 4px 10px; 
            border-radius: 50px; 
            font-size: 11px;
            background: rgba(255, 165, 0, 0.2);
            color: #FFA500;
        }
        .ref-status.completed { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 10px 20px;
            border-top: 1px solid rgba(0, 191, 255, 0.2);
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
            z-index: 1000;
        }
        .nav-item { text-align: center; color: #666; transition: color 0.2s; cursor: pointer; font-size: 11px; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: #00BFFF; }
        
        .scroll-content {
            overflow-y: auto;
            height: calc(100vh - 130px);
            padding: 15px 0 20px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        /* إزالة انحناءات الرأس فقط */
        .header-custom {
            border-radius: 0 !important;
        }
    </style>
</head>
<body>

<div class="game-container">
    <!-- رأس ثابت -->
    <div class="header-custom">
        <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <div class="logo-icon d-flex align-items-center justify-content-center" 
                     style="width: 38px; height: 38px; background: linear-gradient(135deg, #00BFFF, #0088aa); border-radius: 10px;">
                    <i class="fas fa-gamepad text-white"></i>
                </div>
                <span class="logo-text fw-bold fs-5">RockyTap</span>
            </div>
            <div class="d-flex gap-3">
                <i class="fas fa-wallet icon-btn" onclick="goToWithdraw()"></i>
                <i class="fas fa-bell icon-btn" onclick="showAlert('🔔 لا توجد إشعارات جديدة')"></i>
            </div>
        </div>
    </div>
    
    <div class="header-spacer"></div>
    
    <div class="scroll-content">
        <div class="page-title">👥 نظام الإحالات</div>
        
        <!-- إحصائيات -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="totalReferrals">0</div>
                <div class="stat-label">إجمالي الإحالات</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completedReferrals">0</div>
                <div class="stat-label">إحالات مكتملة</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalEarned">0</div>
                <div class="stat-label">إجمالي الأرباح</div>
            </div>
        </div>
        
        <!-- رابط الإحالة -->
        <div class="referral-link-card">
            <div><i class="fas fa-link"></i> <span id="linkLabel">رابط الدعوة الخاص بك</span></div>
            <div class="link-container">
                <input type="text" id="referralLink" readonly value="جاري التحميل...">
                <button class="copy-btn" onclick="copyLink()">📋 نسخ</button>
                <button class="share-btn" onclick="shareLink()">📤 مشاركة</button>
            </div>
            <div class="mt-2 small text-secondary" id="rewardInfo">
                🎁 مكافأة كل إحالة: 100 نقطة + 0.01 تون
            </div>
        </div>
        
        <!-- قائمة المدعوين -->
        <div class="referrals-list">
            <div class="section-title"><i class="fas fa-users"></i> قائمة المدعوين</div>
            <div id="referralsContainer">
                <div class="empty-state">✨ لا توجد إحالات بعد</div>
            </div>
        </div>
    </div>
</div>

<!-- القائمة السفلية -->
<div class="bottom-nav">
    <div class="row text-center">
        <div class="col"><div class="nav-item" onclick="goToHome()"><i class="fas fa-home"></i><div>الرئيسية</div></div></div>
        <div class="col"><div class="nav-item" onclick="goToTasks()"><i class="fas fa-tasks"></i><div>المهام</div></div></div>
        <div class="col"><div class="nav-item" onclick="goToWheel()"><i class="fas fa-gamepad"></i><div>عجلة</div></div></div>
        <div class="col"><div class="nav-item" onclick="goToAds()"><i class="fas fa-video"></i><div>إعلانات</div></div></div>
        <div class="col"><div class="nav-item active" onclick="goToAdmin()"><i class="fas fa-crown"></i><div>أدمن</div></div></div>
    </div>
</div>

<script>
    // ==================== المتغيرات ====================
    let tg = null;
    let currentUserId = null;
    let currentUsername = null;
    
    // اسم البوت - ثابت
    const BOT_USERNAME = 'Youlim5_bot';
    
    // بيانات الإحالات (مخزنة محلياً)
    let referralsData = {
        total: 0,
        completed: 0,
        earned: 0,
        referrals: []
    };
    
    // ==================== تهيئة WebApp ====================
    function initTelegram() {
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUserId = tg.initDataUnsafe.user.id;
                currentUsername = tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name;
                console.log('✅ Telegram user loaded:', currentUserId);
            }
        }
        
        // للاختبار في المتصفح
        if (!currentUserId) {
            currentUserId = localStorage.getItem('testUserId') || 8268443100;
            currentUsername = 'TestUser';
            localStorage.setItem('testUserId', currentUserId);
            console.log('⚠️ Browser mode - using test user:', currentUserId);
        }
        
        window.currentUserId = currentUserId;
        return tg;
    }
    
    // ==================== رابط الإحالة ====================
    function getReferralLink() {
        return `https://t.me/${BOT_USERNAME}?start=ref_${currentUserId}`;
    }
    
    // ==================== تحميل البيانات من localStorage ====================
    function loadReferralsFromStorage() {
        const saved = localStorage.getItem(`referrals_${currentUserId}`);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                referralsData = data;
            } catch(e) {}
        }
        updateUI();
    }
    
    // ==================== حفظ البيانات ====================
    function saveReferralsToStorage() {
        localStorage.setItem(`referrals_${currentUserId}`, JSON.stringify(referralsData));
    }
    
    // ==================== إضافة إحالة جديدة (من البوت) ====================
    function addReferral(referredUsername, rewardPoints, rewardTon) {
        const newRef = {
            id: Date.now(),
            username: referredUsername,
            date: new Date().toLocaleDateString('ar-EG'),
            reward_points: rewardPoints || 100,
            reward_ton: rewardTon || 0.01,
            status: 'pending'
        };
        
        referralsData.referrals.unshift(newRef);
        referralsData.total++;
        saveReferralsToStorage();
        updateUI();
    }
    
    // ==================== إكمال إحالة ====================
    function completeReferral(refId) {
        const ref = referralsData.referrals.find(r => r.id == refId);
        if (ref && ref.status === 'pending') {
            ref.status = 'completed';
            referralsData.completed++;
            referralsData.earned += ref.reward_points;
            saveReferralsToStorage();
            updateUI();
            
            // إرسال إلى البوت
            sendToBot('referral_completed', {
                referred: ref.username,
                reward: ref.reward_points
            });
        }
    }
    
    // ==================== تحديث الواجهة ====================
    function updateUI() {
        // تحديث الإحصائيات
        document.getElementById('totalReferrals').innerText = referralsData.total;
        document.getElementById('completedReferrals').innerText = referralsData.completed;
        document.getElementById('totalEarned').innerText = referralsData.earned;
        
        // تحديث رابط الإحالة
        const linkInput = document.getElementById('referralLink');
        if (linkInput) {
            linkInput.value = getReferralLink();
        }
        
        // تحديث قائمة المدعوين
        const container = document.getElementById('referralsContainer');
        if (referralsData.referrals.length === 0) {
            container.innerHTML = '<div class="empty-state">✨ لا توجد إحالات بعد<br>شارك رابطك لتدعو أصدقائك!</div>';
            return;
        }
        
        let html = '';
        for (let ref of referralsData.referrals) {
            const statusClass = ref.status === 'completed' ? 'completed' : '';
            const statusText = ref.status === 'completed' ? 'مكتمل ✓' : 'قيد الانتظار ⏳';
            
            html += `
                <div class="referral-item">
                    <div>
                        <div class="ref-name"><i class="fas fa-user-circle"></i> ${ref.username}</div>
                        <div class="ref-date">📅 ${ref.date}</div>
                    </div>
                    <div style="text-align: left;">
                        <div class="ref-status ${statusClass}">${statusText}</div>
                        <div class="small" style="color: #FFD700; margin-top: 5px;">⭐ +${ref.reward_points}</div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }
    
    // ==================== نسخ الرابط ====================
    function copyLink() {
        const link = getReferralLink();
        
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(link).then(() => {
                showAlert('✅ تم نسخ رابط الإحالة!');
            }).catch(() => {
                fallbackCopy(link);
            });
        } else {
            fallbackCopy(link);
        }
    }
    
    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showAlert('✅ تم نسخ رابط الإحالة!');
    }
    
    // ==================== مشاركة الرابط ====================
    function shareLink() {
        const link = getReferralLink();
        const text = `🎉 انضم إلى RockyTap واربح العملات الرقمية!\n\nرابط الدعوة الخاص بي:\n${link}`;
        
        if (tg && tg.showPopup) {
            tg.showPopup({
                title: 'مشاركة رابط الإحالة',
                message: link,
                buttons: [{ type: 'default', text: 'نسخ الرابط' }, { type: 'cancel' }]
            }, (buttonId) => {
                if (buttonId === '0') {
                    copyLink();
                }
            });
        } else if (navigator.share) {
            navigator.share({
                title: 'انضم إلى RockyTap',
                text: 'ادعوك للانضمام إلى RockyTap وربح العملات الرقمية!',
                url: link
            }).catch(() => {});
        } else {
            copyLink();
        }
        
        sendToBot('share_referral', { link: link });
    }
    
    // ==================== إرسال إلى البوت ====================
    function sendToBot(action, data) {
        if (tg && tg.sendData) {
            tg.sendData(JSON.stringify({ action: action, ...data }));
        }
        console.log('📤 Send to bot:', action, data);
    }
    
    // ==================== التنبيهات ====================
    function showAlert(message) {
        if (tg && tg.showAlert) {
            tg.showAlert(message);
        } else {
            alert(message);
        }
    }
    
    // ==================== التنقل بين الصفحات ====================
    function goToHome() {
        window.location.href = 'index.html';
    }
    function goToTasks() {
        window.location.href = 'tasks.html';
    }
    function goToWheel() {
        window.location.href = 'wheel.html';
    }
    function goToAds() {
        window.location.href = 'ads.html';
    }
    function goToWithdraw() {
        window.location.href = 'withdraw.html';
    }
    function goToAdmin() {
        window.location.href = 'admin.html';
    }
    
    // ==================== استقبال بيانات من البوت ====================
    window.handleBotData = function(data) {
        console.log('📥 Received from bot:', data);
        
        if (data.action === 'referral_data') {
            if (data.referrals) {
                referralsData = {
                    total: data.total || 0,
                    completed: data.completed || 0,
                    earned: data.earned || 0,
                    referrals: data.referrals || []
                };
                saveReferralsToStorage();
                updateUI();
            }
        } else if (data.action === 'new_referral') {
            addReferral(data.username, data.reward_points, data.reward_ton);
            showAlert(`🎉 تمت إحالة جديدة: ${data.username}`);
        } else if (data.action === 'referral_completed') {
            completeReferral(data.ref_id);
            showAlert(`✅ مبروك! اكتملت إحالة ${data.username} وحصلت على المكافأة!`);
        }
    };
    
    // ==================== طلب بيانات من البوت ====================
    function requestReferralData() {
        sendToBot('get_referral_data', { user_id: currentUserId });
    }
    
    // ==================== التهيئة ====================
    function initPage() {
        console.log('📋 Initializing referral page...');
        initTelegram();
        loadReferralsFromStorage();
        
        // طلب أحدث البيانات من البوت
        setTimeout(() => {
            requestReferralData();
        }, 500);
    }
    
    // تشغيل التهيئة
    initPage();
</script>

</body>
</html>
