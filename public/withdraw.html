<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RockyTap - السحب</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0A0F1A 0%, #05080F 100%);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            padding: 0;
            padding-bottom: 80px;
        }
        .game-container { max-width: 450px; margin: 0 auto; }
        
        .header-custom {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            border-bottom: 1px solid rgba(0, 191, 255, 0.2);
            z-index: 1000;
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
            border-radius: 0 !important;
        }
        .header-spacer { height: 65px; }
        
        .logo-text {
            background: linear-gradient(135deg, #00BFFF, #00CED1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }
        .icon-btn { 
            font-size: 1.5rem; 
            cursor: pointer; 
            transition: all 0.2s; 
            color: #aaa; 
            margin-left: 15px;
            background: transparent;
            border: none;
        }
        .icon-btn:hover { color: #00BFFF; transform: scale(1.1); }
        
        .lang-btn {
            background: rgba(0, 191, 255, 0.15);
            border: 1px solid rgba(0, 191, 255, 0.3);
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            color: #00BFFF;
            transition: all 0.2s;
            border-radius: 20px;
        }
        
        .page-title { text-align: center; padding: 20px; color: #00BFFF; font-size: 24px; font-weight: 800; }
        
        .balance-card {
            background: linear-gradient(135deg, rgba(0, 30, 50, 0.6), rgba(0, 15, 30, 0.8));
            border-radius: 24px;
            padding: 20px;
            margin: 20px 16px;
            text-align: center;
        }
        .balance-value { font-size: 42px; font-weight: 800; background: linear-gradient(135deg, #fff, #00BFFF); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .input-group { margin: 0 16px 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #00BFFF; font-size: 14px; }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,191,255,0.3);
            border-radius: 16px;
            color: white;
            font-size: 14px;
        }
        
        .withdraw-btn {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            padding: 14px;
            border-radius: 60px;
            color: #1a1a2e;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: calc(100% - 32px);
            margin: 0 16px 20px;
        }
        
        .history-section { margin: 20px 16px; }
        .history-title { font-size: 18px; font-weight: bold; color: #00BFFF; margin-bottom: 15px; border-bottom: 1px solid rgba(0,191,255,0.2); padding-bottom: 10px; }
        .history-item {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-status { padding: 4px 12px; border-radius: 50px; font-size: 11px; }
        .status-pending { background: rgba(255,165,0,0.2); color: #FFA500; }
        .status-completed { background: rgba(46,204,113,0.2); color: #2ecc71; }
        .status-rejected { background: rgba(231,76,60,0.2); color: #e74c3c; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            padding: 10px 20px;
            border-top: 1px solid rgba(0,191,255,0.2);
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            justify-content: space-around;
        }
        .nav-item {
            text-align: center;
            color: #666;
            cursor: pointer;
            font-size: 11px;
        }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: #00BFFF; }
        
        .scroll-content {
            overflow-y: auto;
            height: calc(100vh - 130px);
            padding: 15px 0;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header-custom">
        <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <div class="logo-icon d-flex align-items-center justify-content-center" 
                     style="width: 38px; height: 38px; background: linear-gradient(135deg, #00BFFF, #0088aa); border-radius: 10px;">
                    <i class="fas fa-gamepad text-white"></i>
                </div>
                <span class="logo-text fw-bold fs-5">RockyTap</span>
            </div>
            <div class="d-flex gap-3 align-items-center">
                <button class="lang-btn" onclick="toggleLanguage()"><i class="fas fa-globe"></i> EN</button>
                <i class="fas fa-wallet icon-btn" onclick="goTo('withdraw')"></i>
                <i class="fas fa-bell icon-btn" onclick="showAlert('🔔 لا توجد إشعارات جديدة')"></i>
            </div>
        </div>
    </div>
    
    <div class="header-spacer"></div>
    
    <div class="scroll-content">
        <div class="page-title">💰 السحب</div>
        
        <div class="balance-card">
            <div>رصيدك المتاح</div>
            <div class="balance-value" id="balance">0.00</div>
            <div>TON</div>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-link"></i> عنوان المحفظة</label>
            <input type="text" id="walletAddress" placeholder="UQ... أو EQ...">
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-coins"></i> المبلغ (TON)</label>
            <input type="number" id="amount" placeholder="الحد الأدنى 0.02" step="0.01" min="0.02">
        </div>
        
        <button class="withdraw-btn" onclick="requestWithdraw()">🚀 طلب سحب</button>
        
        <div class="history-section">
            <div class="history-title">📋 السحوبات السابقة</div>
            <div id="historyList"></div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="goTo('home')"><i class="fas fa-home"></i><div>الرئيسية</div></div>
    <div class="nav-item" onclick="goTo('tasks')"><i class="fas fa-tasks"></i><div>المهام</div></div>
    <div class="nav-item" onclick="goTo('wheel')"><i class="fas fa-gamepad"></i><div>عجلة</div></div>
    <div class="nav-item" onclick="goTo('ads')"><i class="fas fa-video"></i><div>إعلانات</div></div>
    <div class="nav-item active" onclick="goTo('admin')"><i class="fas fa-crown"></i><div>أدمن</div></div>
</div>

<script>
    let currentUserId = null;
    let userBalance = 0;
    let withdrawals = [];
    
    function init() {
        let tg = initWebApp();
        let user = getUser();
        if (user) {
            currentUserId = user.id;
        }
        
        loadData();
    }
    
    async function loadData() {
        try {
            // تحميل رصيد المستخدم
            const userResult = await getUserData(currentUserId);
            if (userResult && userResult.success) {
                userBalance = userResult.ton || 0;
                document.getElementById('balance').innerText = userBalance.toFixed(4);
            }
            
            // تحميل سجل السحوبات
            const withdrawalsResult = await getUserWithdrawals(currentUserId);
            if (withdrawalsResult && withdrawalsResult.success) {
                withdrawals = withdrawalsResult.withdrawals || [];
            } else {
                // بيانات تجريبية
                withdrawals = [
                    { id: 1, amount: 0.05, requested_at: "2024-01-15", status: "completed" },
                    { id: 2, amount: 0.10, requested_at: "2024-01-20", status: "pending" }
                ];
            }
            
            renderHistory();
        } catch(e) {
            console.error('Error loading data:', e);
            userBalance = 1.25;
            document.getElementById('balance').innerText = userBalance.toFixed(4);
            withdrawals = [
                { id: 1, amount: 0.05, requested_at: "2024-01-15", status: "completed" },
                { id: 2, amount: 0.10, requested_at: "2024-01-20", status: "pending" }
            ];
            renderHistory();
        }
    }
    
    function renderHistory() {
        let historyHtml = '';
        for (let w of withdrawals) {
            let statusClass = w.status === 'pending' ? 'status-pending' : (w.status === 'completed' ? 'status-completed' : 'status-rejected');
            let statusText = w.status === 'pending' ? 'قيد المعالجة' : (w.status === 'completed' ? 'مكتمل' : 'مرفوض');
            historyHtml += `
                <div class="history-item">
                    <div>
                        <div>💰 ${w.amount} TON</div>
                        <div style="font-size:11px;color:#aaa;">📅 ${w.requested_at || w.date || ''}</div>
                    </div>
                    <div class="history-status ${statusClass}">${statusText}</div>
                </div>
            `;
        }
        document.getElementById('historyList').innerHTML = historyHtml || '<div style="text-align:center;padding:20px;color:#666;">لا توجد سحوبات سابقة</div>';
    }
    
    async function requestWithdraw() {
        let wallet = document.getElementById('walletAddress').value.trim();
        let amount = parseFloat(document.getElementById('amount').value);
        let user = getUser();
        
        if (!wallet) {
            showAlert('⚠️ الرجاء إدخال عنوان المحفظة');
            return;
        }
        if (!amount || amount < 0.02) {
            showAlert('⚠️ الحد الأدنى للسحب هو 0.02 TON');
            return;
        }
        if (amount > userBalance) {
            showAlert('⚠️ المبلغ أكبر من رصيدك');
            return;
        }
        
        showAlert('🔍 جاري إرسال طلب السحب...');
        
        try {
            const result = await requestWithdraw(currentUserId, amount, wallet, user?.username || '');
            
            if (result && result.success) {
                userBalance -= amount;
                document.getElementById('balance').innerText = userBalance.toFixed(4);
                document.getElementById('amount').value = '';
                
                showAlert(`✅ تم إرسال طلب السحب بنجاح!\n💰 المبلغ: ${amount.toFixed(4)} TON\n📋 سيتم مراجعة طلبك من قبل الإدارة`);
                
                // إضافة إلى السجل المحلي
                withdrawals.unshift({
                    id: result.withdrawal_id || Date.now(),
                    amount: amount,
                    requested_at: new Date().toLocaleDateString('ar-EG'),
                    status: 'pending'
                });
                renderHistory();
            } else {
                showAlert('❌ ' + (result?.message || 'حدث خطأ'));
            }
        } catch(e) {
            console.error('Error requesting withdraw:', e);
            showAlert('❌ حدث خطأ في إرسال الطلب');
        }
    }
    
    function toggleLanguage() {
        let btn = document.querySelector('.lang-btn');
        if (btn.innerHTML.includes('EN')) {
            btn.innerHTML = '<i class="fas fa-globe"></i> عربي';
        } else {
            btn.innerHTML = '<i class="fas fa-globe"></i> EN';
        }
    }
    
    function goTo(page) {
        const pages = {
            'home': 'index.html',
            'tasks': 'tasks.html',
            'wheel': 'wheel.html',
            'ads': 'ads.html',
            'withdraw': 'withdraw.html',
            'referral': 'referral.html',
            'giftcode': 'giftcode.html',
            'admin': 'admin.html'
        };
        if (pages[page]) {
            window.location.href = pages[page];
        }
    }
    
    init();
    
    window.requestWithdraw = requestWithdraw;
    window.toggleLanguage = toggleLanguage;
    window.goTo = goTo;
</script>

</body>
</html>
