<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RockyTap - السحب</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0A0F1A 0%, #05080F 100%);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            padding: 15px;
            padding-bottom: 80px;
        }
        .game-container { max-width: 450px; margin: 0 auto; }
        
        .page-title { text-align: center; padding: 20px; color: #00BFFF; font-size: 24px; font-weight: 800; }
        
        .balance-card {
            background: linear-gradient(135deg, rgba(0,30,50,0.6), rgba(0,15,30,0.8));
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .balance-value { font-size: 42px; font-weight: 800; background: linear-gradient(135deg, #fff, #00BFFF); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; color: #00BFFF; }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,191,255,0.3);
            border-radius: 16px;
            color: white;
        }
        
        .withdraw-btn {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            padding: 14px;
            border-radius: 60px;
            color: #1a1a2e;
            font-weight: bold;
            width: 100%;
            margin: 20px 0;
            cursor: pointer;
        }
        
        .history-item {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-pending { color: #FFA500; }
        .status-completed { color: #2ecc71; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            padding: 10px 20px;
            border-top: 1px solid rgba(0,191,255,0.2);
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            justify-content: space-around;
        }
        .nav-item {
            text-align: center;
            color: #666;
            cursor: pointer;
            font-size: 11px;
        }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: #00BFFF; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="page-title">💰 السحب</div>
    
    <div class="balance-card">
        <div>رصيدك المتاح</div>
        <div class="balance-value" id="balance">0.00</div>
        <div>TON</div>
    </div>
    
    <div class="input-group">
        <label><i class="fas fa-link"></i> عنوان المحفظة</label>
        <input type="text" id="walletAddress" placeholder="UQ... أو EQ...">
    </div>
    
    <div class="input-group">
        <label><i class="fas fa-coins"></i> المبلغ (TON)</label>
        <input type="number" id="amount" placeholder="الحد الأدنى 0.02" step="0.01" min="0.02">
    </div>
    
    <button class="withdraw-btn" onclick="requestWithdraw()">🚀 طلب سحب</button>
    
    <h4 style="color:#00BFFF; margin: 20px 0 10px;">📋 السحوبات السابقة</h4>
    <div id="historyList"></div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="goTo('home')"><i class="fas fa-home"></i><div>الرئيسية</div></div>
    <div class="nav-item" onclick="goTo('tasks')"><i class="fas fa-tasks"></i><div>المهام</div></div>
    <div class="nav-item" onclick="goTo('wheel')"><i class="fas fa-gamepad"></i><div>عجلة</div></div>
    <div class="nav-item" onclick="goTo('ads')"><i class="fas fa-video"></i><div>إعلانات</div></div>
    <div class="nav-item active" onclick="goTo('withdraw')"><i class="fas fa-wallet"></i><div>سحب</div></div>
</div>

<script>
    let userBalance = 0;
    
    async function loadData() {
        currentUserId = window.currentUserId;
        if (!currentUserId) {
            currentUserId = 8268443100;
        }
        
        try {
            const userResult = await getUserData(currentUserId);
            if (userResult && userResult.success) {
                userBalance = userResult.ton || 0;
                document.getElementById('balance').innerText = userBalance.toFixed(4);
            }
            
            const withdrawalsResult = await getUserWithdrawals(currentUserId);
            if (withdrawalsResult && withdrawalsResult.success) {
                renderHistory(withdrawalsResult.withdrawals || []);
            }
        } catch(e) {
            console.error('Error loading data:', e);
        }
    }
    
    function renderHistory(withdrawals) {
        let html = '';
        for (let w of withdrawals) {
            let statusClass = w.status === 'pending' ? 'status-pending' : 'status-completed';
            let statusText = w.status === 'pending' ? 'قيد المعالجة' : 'مكتمل';
            html += `
                <div class="history-item">
                    <div>
                        <div>💰 ${w.amount} TON</div>
                        <div style="font-size:11px;color:#aaa;">📅 ${w.requested_at}</div>
                    </div>
                    <div class="${statusClass}">${statusText}</div>
                </div>
            `;
        }
        document.getElementById('historyList').innerHTML = html || '<div style="text-align:center;padding:20px;color:#666;">لا توجد سحوبات سابقة</div>';
    }
    
    async function requestWithdraw() {
        let wallet = document.getElementById('walletAddress').value.trim();
        let amount = parseFloat(document.getElementById('amount').value);
        
        if (!wallet) {
            showAlert('⚠️ الرجاء إدخال عنوان المحفظة');
            return;
        }
        if (!amount || amount < 0.02) {
            showAlert('⚠️ الحد الأدنى للسحب هو 0.02 TON');
            return;
        }
        if (amount > userBalance) {
            showAlert('⚠️ المبلغ أكبر من رصيدك');
            return;
        }
        
        showAlert('🔍 جاري إرسال طلب السحب...');
        
        try {
            const result = await requestWithdraw(currentUserId, amount, wallet, '');
            
            if (result && result.success) {
                userBalance -= amount;
                document.getElementById('balance').innerText = userBalance.toFixed(4);
                document.getElementById('amount').value = '';
                showAlert(`✅ تم إرسال طلب السحب بنجاح!`);
                loadData();
            } else {
                showAlert('❌ ' + (result?.message || 'حدث خطأ'));
            }
        } catch(e) {
            console.error('Error requesting withdraw:', e);
            showAlert('❌ حدث خطأ في إرسال الطلب');
        }
    }
    
    loadData();
</script>

</body>
</html>
